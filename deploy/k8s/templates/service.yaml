apiVersion: v1
kind: Service
metadata:
  name: {{ include "smooth-operator-agent.fullname" . }}
  labels:
    {{- include "smooth-operator-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: ws
      port: {{ .Values.service.port }}
      targetPort: ws
      protocol: TCP
  selector:
    {{- include "smooth-operator-agent.selectorLabels" . | nindent 4 }}
