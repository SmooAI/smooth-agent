{{- if include "smooth-operator-agent.createSecret" . -}}
# Chart-managed Secret. ONLY rendered when an inline secret value is supplied
# (gateway.key or database.url) AND no external secret ref overrides it.
#
# Prefer referencing an EXISTING secret (gateway.keySecretRef / database.urlSecretRef,
# e.g. managed by external-secrets-operator) in production — inline values land
# in your values file / ArgoCD manifest and are easy to leak.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "smooth-operator-agent.secretName" . }}
  labels:
    {{- include "smooth-operator-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.gateway.key (not .Values.gateway.keySecretRef.name) }}
  SMOOAI_GATEWAY_KEY: {{ .Values.gateway.key | quote }}
  {{- end }}
  {{- if and .Values.database.url (not .Values.database.urlSecretRef.name) }}
  SMOOTH_AGENT_DATABASE_URL: {{ .Values.database.url | quote }}
  {{- end }}
{{- end }}
