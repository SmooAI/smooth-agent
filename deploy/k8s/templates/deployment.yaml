apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smooth-operator.fullname" . }}
  labels:
    {{- include "smooth-operator.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "smooth-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the non-secret config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "smooth-operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "smooth-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: ws
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "smooth-operator.fullname" . }}-config
          env:
            {{- /* Gateway key — optional at startup; omitted if neither inline
                   value nor external ref is configured (server still answers
                   protocol-only actions). */}}
            {{- if or .Values.gateway.key .Values.gateway.keySecretRef.name }}
            - name: SMOOAI_GATEWAY_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "smooth-operator.gatewayKeySecretName" . }}
                  key: {{ include "smooth-operator.gatewayKeySecretKey" . }}
            {{- end }}
            {{- /* Database URL — required for the pgvector-backed Postgres
                   adapter. Server reads SMOOTH_AGENT_DATABASE_URL first, then
                   DATABASE_URL. */}}
            {{- if or .Values.database.url .Values.database.urlSecretRef.name }}
            - name: SMOOTH_AGENT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "smooth-operator.databaseSecretName" . }}
                  key: {{ include "smooth-operator.databaseSecretKey" . }}
            {{- end }}
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.securityContext.readOnlyRootFilesystem }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if .Values.securityContext.readOnlyRootFilesystem }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
