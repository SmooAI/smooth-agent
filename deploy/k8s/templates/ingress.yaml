{{- if .Values.ingress.enabled -}}
{{- $fullName := include "smooth-operator-agent.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "smooth-operator-agent.labels" . | nindent 4 }}
  annotations:
    {{- /* WebSocket-friendly annotations. The nginx websocket-services
           annotation needs the backing Service name; fill it if left blank. */}}
    {{- range $k, $v := .Values.ingress.annotations }}
    {{- if and (eq $k "nginx.ingress.kubernetes.io/websocket-services") (not $v) }}
    {{ $k }}: {{ $fullName | quote }}
    {{- else }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
{{- end }}
